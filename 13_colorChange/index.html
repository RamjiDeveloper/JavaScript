<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Background Color Switcher</title>
</head>
<style>
    .button{
        width: 50px;
        height: 50px;
        padding: 20px;
        border: 1px solid black;
        background-color: white;
        
    }
</style>
<body>
    <nav style="display: flex; align-items: center; justify-content: center; width: 100%; height: 40px; gap: 20px; background-color: rgba(235, 233, 233, 0.744); border-bottom: 1px solid #1f1f1f;">
        <a style="text-decoration: none; color: black; border: 1px solid black; padding: 5px 25px; border-radius: 3px; background-color: aliceblue;" href="/" aria-current="page">Home</a> 
        
        <a style='text-decoration: none; color: black; border: 1px solid black; padding: 5px 25px; border-radius: 3px; background-color: rgb(247, 249, 250);' target="_blank" href="www.youtube.com/@HiCodersYT">Youtube channel</a>
    </nav>

    <div style="display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center;" class="canva">

        <h1>Color Scheme Switcher</h1>
        <div style="display: flex; gap: 10px;" class="btn">
        <span style="background-color: white;" class="button" id="white"></span>
        <span style="background-color: gray;" class="button" id="gray"></span>
        <span style="background-color: blue;" class="button" id="blue"></span>
        <span style="background-color: yellow;" class="button" id="yellow"></span>
        </div>
        <h2>Try clicking on one of the colors above
            <span>to change the background color of this page!</span>
        </h2>
    </div>
</body>
<script src="script.js"></script>
</html>
